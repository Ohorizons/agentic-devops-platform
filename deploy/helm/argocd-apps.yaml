# =============================================================================
# ArgoCD — Platform App-of-Apps
# =============================================================================
# Registers all platform components as ArgoCD Applications for GitOps management
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-backstage
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ${PLATFORM_ID}
    ${PLATFORM_ID}/horizon: h2
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: main
    path: deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-monitoring
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ${PLATFORM_ID}
    ${PLATFORM_ID}/horizon: h2
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: main
    path: prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-argocd-config
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ${PLATFORM_ID}
    ${PLATFORM_ID}/horizon: h2
spec:
  project: default
  source:
    repoURL: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
    targetRevision: main
    path: argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
