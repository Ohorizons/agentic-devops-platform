# =============================================================================
# Backstage AKS Deployment — REFERENCE TEMPLATE
# For client deployments, run: ./scripts/setup-portal.sh
# It generates: deploy/helm/backstage-values-<env>.yaml
# =============================================================================

ingress:
  enabled: true
  className: nginx
  host: ${BACKSTAGE_DOMAIN}
  path: /
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - ${BACKSTAGE_DOMAIN}
      secretName: ${TLS_SECRET_NAME}

backstage:
  replicas: 1

  image:
    registry: ${ACR_REGISTRY}
    repository: ${ACR_IMAGE_REPOSITORY}
    tag: "${IMAGE_TAG}"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  containerSecurityContext:
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault

  extraEnvVarsSecrets:
    - backstage-github-app

  appConfig:
    app:
      title: ${PORTAL_NAME} | Agentic DevOps Platform
      baseUrl: https://${BACKSTAGE_DOMAIN}
      branding:
        fullLogo:
          alt: ${PORTAL_NAME} — Agentic DevOps Platform
          src: https://img.icons8.com/fluency/96/microsoft.png
          width: 40
        iconLogo:
          alt: ${PORTAL_NAME}
          src: https://img.icons8.com/fluency/48/microsoft.png
          width: 28
        theme:
          dark:
            primaryColor: '#4CC2FF'
          light:
            primaryColor: '#0078D4'
    organization:
      name: ${PORTAL_NAME} — Agentic DevOps Platform
    backend:
      baseUrl: https://${BACKSTAGE_DOMAIN}
      listen:
        port: 7007
      reading:
        allow:
          - host: raw.githubusercontent.com
      csp:
        img-src: ["'self'", 'data:', 'https:']
        upgrade-insecure-requests: false
      cors:
        origin: https://${BACKSTAGE_DOMAIN}
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true

    # ── GitHub Integration (App-based) ──────────────────────────────
    integrations:
      github:
        - host: github.com
          apps:
            - appId: ${GITHUB_APP_ID}
              clientId: ${GITHUB_APP_CLIENT_ID}
              clientSecret: ${GITHUB_APP_CLIENT_SECRET}
              privateKey: ${GITHUB_APP_PRIVATE_KEY}

    # ── Authentication (GitHub only) ────────────────────────────────
    auth:
      environment: development
      providers:
        github:
          development:
            clientId: ${GITHUB_APP_CLIENT_ID}
            clientSecret: ${GITHUB_APP_CLIENT_SECRET}
            signIn:
              resolvers:
                - resolver: usernameMatchingUserEntityName
                  dangerouslyAllowSignInWithoutUserInCatalog: true

    # ── Software Catalog ────────────────────────────────────────────
    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location, Domain, Template, User, Group]
      locations:
        - type: url
          target: https://raw.githubusercontent.com/${GITHUB_ORG}/${GITHUB_REPO}/main/backstage/catalog-info.yaml
          rules:
            - allow: [Component]
        - type: url
          target: https://raw.githubusercontent.com/${GITHUB_ORG}/${GITHUB_REPO}/main/backstage/examples/org.yaml
          rules:
            - allow: [User, Group, Domain, System]
        - type: url
          target: https://raw.githubusercontent.com/${GITHUB_ORG}/${GITHUB_REPO}/main/backstage/examples/entities.yaml
          rules:
            - allow: [Component, API, System, Resource, Domain]
        - type: url
          target: https://raw.githubusercontent.com/${GITHUB_ORG}/${GITHUB_REPO}/main/backstage/examples/demo-template.yaml
          rules:
            - allow: [Template]

postgresql:
  enabled: true
  auth:
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
