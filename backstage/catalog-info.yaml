apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: developer-portal
  title: Agentic DevOps Platform — Developer Portal
  description: Enterprise developer portal powered by Backstage. Central hub for Golden Path templates, Service Catalog, TechDocs, APIs, and platform services.
  annotations:
    github.com/project-slug: ${GITHUB_ORG}/${GITHUB_REPO}
    backstage.io/techdocs-ref: dir:.
  tags:
    - backstage
    - developer-portal
    - platform-engineering
  links:
    - url: https://github.com/${GITHUB_ORG}/${GITHUB_REPO}
      title: GitHub Repository
      icon: github
    - url: https://${BACKSTAGE_DOMAIN}/docs
      title: TechDocs
      icon: docs
    - url: https://${BACKSTAGE_DOMAIN}/create
      title: Golden Path Templates
      icon: scaffolder
spec:
  type: website
  owner: group:default/platform-engineering
  lifecycle: production
  system: developer-platform
